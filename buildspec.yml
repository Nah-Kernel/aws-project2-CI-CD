version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin $REPOSITORY_URL
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
  build:
    commands:
      - echo Build started on `date`
      - echo Building Docker image inside my-web-app directory...
      # Chạy lệnh build đúng ngữ cảnh thư mục chứa Dockerfile
      - cd my-web-app && docker build -t $REPOSITORY_URL:latest .
      - docker tag $REPOSITORY_URL:latest $REPOSITORY_URL:$IMAGE_TAG
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker image...
      - docker push $REPOSITORY_URL:latest
      - docker push $REPOSITORY_URL:$IMAGE_TAG
      - echo Writing image definitions file...
      # ĐÃ FIX CHỐT HẠ: Ép lệnh sed chọc thẳng vào bên trong thư mục con my-web-app để sửa file
      - sed -i "s|<IMAGE_PLACEHOLDER>|$REPOSITORY_URL:$IMAGE_TAG|g" my-web-app/taskdef.json

artifacts:
  # ĐÃ FIX CHỐT HẠ: Khai báo tường minh cho CodePipeline bốc 2 file cấu hình cốt lõi nằm trong thư mục con để bàn giao sang khối Deploy
  files:
    - my-web-app/taskdef.json
    - my-web-app/appspec.yaml
  # Loại bỏ lớp bọc thư mục rác để khi CodeDeploy giải nén ra sẽ thấy 2 file này ở lớp ngoài cùng của gói Artifact
  discard-paths: yes