version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin $REPOSITORY_URL
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
  build:
    commands:
      - echo Build started on `date`
      - echo Moving into app directory and building Docker image...
      # ĐÃ FIX: Di chuyển vào đúng thư mục chứa source code app trước khi chạy lệnh docker build
      - cd my-web-app
      - docker build -t $REPOSITORY_URL:latest .
      - docker tag $REPOSITORY_URL:latest $REPOSITORY_URL:$IMAGE_TAG
      - cd .. # Quay trở lại thư mục gốc để làm việc với các file cấu hình hạ tầng
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker image...
      - docker push $REPOSITORY_URL:latest
      - docker push $REPOSITORY_URL:$IMAGE_TAG
      - echo Writing image definitions file...
      # ĐÃ FIX: Thay thế placeholder trong file taskdef.json ở cả 2 vị trí để CodeDeploy không bị đói file
      - sed -i "s|<IMAGE_PLACEHOLDER>|$REPOSITORY_URL:$IMAGE_TAG|g" taskdef.json
      - sed -i "s|<IMAGE_PLACEHOLDER>|$REPOSITORY_URL:$IMAGE_TAG|g" my-web-app/taskdef.json

artifacts:
  files:
    - taskdef.json
    - appspec.yaml
    - my-web-app/taskdef.json
    - my-web-app/appspec.yaml